version: "3.9"

services:
  api:
    build:
      context: ./backend
    container_name: fastapi_app
    depends_on:
      - postgres
    env_file:
      - ./backend/.env
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/app
    command: >
      sh -c "
      alembic upgrade head &&
      python init_admin.py &&
      uvicorn app.api:app --host 0.0.0.0 --port 8000
      "

  postgres:
    image: postgres:15
    container_name: postgres_db
    restart: always
    env_file:
      - ./backend/.env
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./backend/init.sql:/docker-entrypoint-initdb.d/init.sql

  frontend:
    build:
      context: ./frontend
    container_name: react_app
    depends_on:
      - api
    ports:
      - "80:3000"
    env_file:
      - ./frontend/.env

volumes:
  postgres_data: